name: Build and Test Cybersecurity Awareness Assistant

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore CybersecurityAwarenessBot_Part2.sln

    - name: Build
      run: dotnet build CybersecurityAwarenessBot_Part2.sln --configuration Release --no-restore